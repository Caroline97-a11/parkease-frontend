<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login-Parkease</title>

    <!-- Displays the system logo in the browser tab (favicon) -->
    <link rel="icon" type="image/png" href="images/logo.png" />

    <!-- Bootstrap CSS for styling and responsive layout -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- External CSS file for custom styles of the login page -->
    <link rel="stylesheet" href="style/index.css" />
  </head>

  <body>
    <div class="logo d-flex align-items-center mt-4 gap-3">
      <img src="images/logo.png" width="80" />

      <div>
        <h4 class="mb-0 fw-bold text-primary-emphasis">
          Welcome to ParkEase System
        </h4>
      </div>
    </div>

    <!-- Main container that holds the login form and image section -->
    <div class="container">
      <!-- Section containing the login form -->
      <div class="login-section">
        <!-- Login instruction heading -->
        <h3>Please Login</h3>

        <!-- Login form -->
        <form>
          <!-- Username input field -->
          <div class="input-box">
            <input type="text" placeholder="Username" required />
          </div>

          <!-- Password input field -->
          <div class="input-box">
            <input type="password" placeholder="Password" required />
          </div>

          <!-- Checkbox to remember the user's login -->
          <div class="remember"><input type="checkbox" /> Remember me</div>

          <!-- Login button that redirects the user to the dashboard -->
          <a href="Dashboard.html" class="btn btn-primary">Login</a>
        </form>
      </div>

      <!-- Section for displaying a decorative or informational image -->
      <div class="image-section"></div>
    </div>
  </body>
</html>
